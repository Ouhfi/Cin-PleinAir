<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/Css/style.css">
</head>
<body>
<header class="header">

  <div class="logo">
    <img src="/icons/netflix_macos_bigsur_icon_189917.png" alt="logo">
  </div>

  <nav class="navbar">
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#home">movies</a>
    <a href="#contact">contact</a>
  </nav>
</header>


<div class="container" id="home">


<div class="movie-card ">
  <img class="img" src="/imag/Screenshot from 2026-04-16 10-26-59.png" alt="Movie 1">
  <div class="overlay">
    <h3>Movie Title</h3>
    <span>⭐ 8.5</span>
  </div>
</div>


<div class="movie-card ">
  <img class="img" src="/imag/Screenshot from 2026-04-16 10-26-33.png" alt="Movie 2">
  <div class="overlay">
    <h3>Another Movie</h3>
    <span>⭐ 7.9</span>
  </div>
</div>

<div class="movie-card ">
  <img   class="img" src="/imag/Screenshot from 2026-04-16 10-25-58.png" alt="Movie 3">
  <div class="overlay">
    <h3>Cool Movie</h3>
    <span>⭐ 9.1</span>
  </div>
</div>
</div>
<div class="text">


  <div class="About" id="about">
  <h2>About Us</h2>

  <p>
    This website is a simple movie platform inspired by Netflix.
    You can explore movies, see ratings, and enjoy a clean design.
  </p>
</div>


<div  class="contact" id="contact">
  <div class="inputBox">
    <input type="text" required>
    <label>Enter your name</label>
  </div>

  <div class="inputBox">
    <input type="email" required>
    <label>Enter your email</label>
  </div>
</div>
    
</div>
<script src="/script/script.js"></script>
</body>
</html>
